<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Anime Power-Scaling Database v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f2e 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 20, 40, 0.8);
            border-bottom: 2px solid #00ffff;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        h1 {
            font-size: 3.5em;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        /* Search Bar */
        .search-container {
            margin: 30px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-input {
            padding: 12px 20px;
            border: 2px solid #00ffff;
            background: rgba(0, 20, 40, 0.9);
            color: #00ffff;
            border-radius: 8px;
            font-size: 1em;
            width: 300px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            border-color: #ff00ff;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            color: #ff00ff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }

        /* Character Grid */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .character-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }

        .character-card:hover {
            transform: translateY(-10px);
            border-color: #ff00ff;
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.4);
        }

        .character-portrait {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #00ffff;
            transition: transform 0.3s ease;
        }

        .character-card:hover .character-portrait {
            transform: scale(1.05);
        }

        .character-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 5px;
        }

        .character-anime {
            font-size: 0.9em;
            color: #ff00ff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .tier-badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #ff0080, #ff00ff);
            color: #fff;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        .stats-container {
            margin: 15px 0;
        }

        .stat-bar {
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            color: #00ffff;
        }

        .stat-fill {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid #00ffff;
        }

        .stat-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .analyze-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ffff, #00ff88);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .analyze-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: scale(1.05);
        }

        /* Versus Mode */
        .versus-section {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #ff0080;
            border-radius: 12px;
            padding: 30px;
            margin: 40px 0;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.3);
        }

        .versus-title {
            font-size: 2em;
            color: #ff0080;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        .versus-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .versus-container {
                grid-template-columns: 1fr;
            }
        }

        .versus-selector {
            position: relative;
        }

        .versus-label {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .searchable-dropdown {
            width: 100%;
            padding: 12px;
            border: 2px solid #00ffff;
            background: rgba(0, 20, 40, 0.9);
            color: #00ffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .searchable-dropdown:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .fight-btn {
            grid-column: 1 / -1;
            padding: 15px;
            background: linear-gradient(135deg, #ff0080, #ff00ff);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.4);
        }

        .fight-btn:hover {
            box-shadow: 0 0 40px rgba(255, 0, 128, 0.8);
            transform: scale(1.05);
        }

        .battle-result {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .battle-result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .battle-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .battle-table th,
        .battle-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .battle-table th {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            font-weight: bold;
        }

        .battle-verdict {
            color: #00ff88;
            font-style: italic;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            border-radius: 4px;
        }

        /* Tier List */
        .tier-section {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 30px;
            margin: 40px 0;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .tier-title {
            font-size: 2em;
            color: #00ff88;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tier-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tier-category {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
        }

        .tier-category-title {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .tier-item {
            padding: 10px;
            background: rgba(0, 255, 255, 0.1);
            border-left: 3px solid #ff00ff;
            margin-bottom: 10px;
            border-radius: 4px;
            color: #e0e0e0;
        }

        .tier-rank {
            color: #ff00ff;
            font-weight: bold;
            margin-right: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(0, 20, 40, 0.95), rgba(10, 10, 30, 0.95));
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            color: #00ffff;
            float: right;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #ff00ff;
            transform: scale(1.2);
        }

        .modal-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .modal-portrait {
            width: 200px;
            height: 250px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #00ffff;
        }

        .modal-title-section {
            flex: 1;
        }

        .modal-title {
            font-size: 2.5em;
            color: #00ffff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-anime {
            font-size: 1.1em;
            color: #ff00ff;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal-info {
            font-size: 0.95em;
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Tabs */
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
        }

        .tab-btn {
            padding: 12px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid transparent;
            color: #00ffff;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: rgba(0, 255, 255, 0.3);
            border-bottom-color: #00ffff;
            color: #fff;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.3);
        }

        .tab-btn:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-card-label {
            color: #ff00ff;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .stat-card-value {
            color: #00ffff;
            font-size: 1.8em;
            font-weight: bold;
        }

        .moves-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .move-card {
            background: rgba(255, 0, 128, 0.1);
            border: 2px solid #ff0080;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .move-card:hover {
            background: rgba(255, 0, 128, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.4);
        }

        .move-name {
            color: #ff0080;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .move-description {
            color: #e0e0e0;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .power-display-image {
            width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            border: 2px solid #ff0080;
            max-height: 400px;
            object-fit: cover;
        }

        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .pros-cons {
                grid-template-columns: 1fr;
            }
        }

        .pros,
        .cons {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
        }

        .cons {
            border-color: #ff0080;
            background: rgba(255, 0, 128, 0.1);
        }

        .pros-title,
        .cons-title {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .cons-title {
            color: #ff0080;
        }

        .pros-list,
        .cons-list {
            list-style: none;
        }

        .pros-list li,
        .cons-list li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            color: #e0e0e0;
        }

        .pros-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #00ff88;
            font-weight: bold;
        }

        .cons-list li::before {
            content: '✗';
            position: absolute;
            left: 0;
            color: #ff0080;
            font-weight: bold;
        }

        .power-system {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .power-system-title {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .power-system-description {
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Load More Button */
        .load-more-container {
            text-align: center;
            margin: 40px 0;
        }

        .load-more-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #00ffff, #00ff88);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .load-more-btn:hover {
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
            transform: scale(1.05);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .characters-count {
            text-align: center;
            color: #00ffff;
            margin: 20px 0;
            font-size: 1.1em;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            h1 {
                font-size: 2.5em;
            }

            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .modal-header {
                flex-direction: column;
                align-items: center;
            }

            .modal-portrait {
                width: 150px;
                height: 200px;
            }
        }

        @media (max-width: 768px) {
            .search-input {
                width: 100%;
            }

            .characters-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .modal-content {
                padding: 20px;
                max-width: 95vw;
            }

            h1 {
                font-size: 2em;
            }

            .modal-title {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>⚡ ULTIMATE ANIME POWER-SCALING DATABASE ⚡</h1>
            <p class="subtitle">Discover the Strongest Anime Characters | Compare Stats | Battle Predictions</p>
        </header>

        <!-- Search & Filter -->
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search characters by name...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Anime</button>
                <button class="filter-btn" data-filter="dragon-ball">Dragon Ball</button>
                <button class="filter-btn" data-filter="naruto">Naruto</button>
                <button class="filter-btn" data-filter="one-piece">One Piece</button>
                <button class="filter-btn" data-filter="death-note">Death Note</button>
                <button class="filter-btn" data-filter="jjk">Jujutsu Kaisen</button>
            </div>
        </div>

        <!-- Characters Grid -->
        <div class="characters-grid" id="charactersGrid"></div>
        <div class="characters-count" id="charactersCount"></div>

        <!-- Load More Button -->
        <div class="load-more-container">
            <button class="load-more-btn" id="loadMoreBtn">Load More Characters ↓</button>
        </div>

        <!-- Versus Mode -->
        <div class="versus-section">
            <h2 class="versus-title">⚔️ Versus Battle Mode ⚔️</h2>
            <div class="versus-container">
                <div class="versus-selector">
                    <label class="versus-label">Select Fighter 1:</label>
                    <select class="searchable-dropdown" id="fighter1">
                        <option value="">Choose a character...</option>
                    </select>
                </div>
                <div class="versus-selector">
                    <label class="versus-label">Select Fighter 2:</label>
                    <select class="searchable-dropdown" id="fighter2">
                        <option value="">Choose a character...</option>
                    </select>
                </div>
                <button class="fight-btn" id="fightBtn">FIGHT! ⚡</button>
            </div>
            <div class="battle-result" id="battleResult"></div>
        </div>

        <!-- Tier List -->
        <div class="tier-section">
            <h2 class="tier-title">🏆 Power Rankings 🏆</h2>
            <div class="tier-list" id="tierList"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="characterModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="modal-header">
                <img id="modalPortrait" class="modal-portrait" src="" alt="">
                <div class="modal-title-section">
                    <h2 class="modal-title" id="modalName"></h2>
                    <p class="modal-anime" id="modalAnime"></p>
                    <div class="modal-info" id="modalBasicInfo"></div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="overview">Overview & Stats</button>
                <button class="tab-btn" data-tab="combat">Combat & Moves</button>
                <button class="tab-btn" data-tab="lore">Lore & Strategy</button>
            </div>

            <!-- Tab 1: Overview & Stats -->

        let displayedCount = 12;
        let filteredCharacters = [...characters];
        let currentFilter = 'all';

        // Initialize
        function init() {
            populateDropdowns();
            renderCharacters();
            renderTierList();
            setupEventListeners();
        }

        function populateDropdowns() {
            const fighter1 = document.getElementById('fighter1');
            const fighter2 = document.getElementById('fighter2');
            characters.forEach(char => {
                const option1 = document.createElement('option');
                option1.value = char.id;
                option1.textContent = `${char.name} (${char.anime})`;
                fighter1.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = char.id;
                option2.textContent = `${char.name} (${char.anime})`;
                fighter2.appendChild(option2);
            });
        }

        function renderCharacters() {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = '';
            
            filteredCharacters.slice(0, displayedCount).forEach(char => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <img src="${char.portrait}" alt="${char.name}" class="character-portrait" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22250%22%3E%3Crect fill=%22%23333%22 width=%22280%22 height=%22250%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2220%22%3E${char.name}%3C/text%3E%3C/svg%3E'">
                    <div class="character-name">${char.name}</div>
                    <div class="character-anime">${char.anime}</div>
                    <div class="tier-badge">${char.tier}</div>
                    <div class="stats-container">
                        <div class="stat-bar">
                            <div class="stat-label"><span>Power</span><span>${char.stats.power}</span></div>
                            <div class="stat-fill"><div class="stat-progress" style="width: ${char.stats.power}%"></div></div>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-label"><span>Speed</span><span>${char.stats.speed}</span></div>
                            <div class="stat-fill"><div class="stat-progress" style="width: ${char.stats.speed}%"></div></div>
                        </div>
                        <div class="stat-bar">
                            <div class="stat-label"><span>Intelligence</span><span>${char.stats.intelligence}</span></div>
                            <div class="stat-fill"><div class="stat-progress" style="width: ${char.stats.intelligence}%"></div></div>
                        </div>
                    </div>
                    <button class="analyze-btn" onclick="openModal(${char.id})">Analyze Power →</button>
                `;
                grid.appendChild(card);
            });

            updateCharactersCount();
        }

        function updateCharactersCount() {
            const count = document.getElementById('charactersCount');
            count.textContent = `Showing ${Math.min(displayedCount, filteredCharacters.length)} of ${filteredCharacters.length} characters`;
        }

        function renderTierList() {
            const tierList = document.getElementById('tierList');
            tierList.innerHTML = '';

            const categories = [
                { title: 'Top 5 Strongest', sort: (a, b) => b.stats.power - a.stats.power },
                { title: 'Top 5 Fastest', sort: (a, b) => b.stats.speed - a.stats.speed },
                { title: 'Top 5 Smartest', sort: (a, b) => b.stats.intelligence - a.stats.intelligence }
            ];

            categories.forEach(cat => {
                const sorted = [...characters].sort(cat.sort).slice(0, 5);
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'tier-category';
                categoryDiv.innerHTML = `<div class="tier-category-title">${cat.title}</div>`;
                
                sorted.forEach((char, idx) => {
                    const item = document.createElement('div');
                    item.className = 'tier-item';
                    item.innerHTML = `<span class="tier-rank">#${idx + 1}</span>${char.name}`;
                    categoryDiv.appendChild(item);
                });
                
                tierList.appendChild(categoryDiv);
            });
        }

        function openModal(charId) {
            const char = characters.find(c => c.id === charId);
            if (!char) return;

            document.getElementById('modalPortrait').src = char.portrait;
            document.getElementById('modalName').textContent = char.name;
            document.getElementById('modalAnime').textContent = char.anime;
            document.getElementById('modalBasicInfo').innerHTML = `
                <p><strong>Age:</strong> ${char.age}</p>
                <p><strong>Alias:</strong> ${char.alias}</p>
                <p><strong>Status:</strong> ${char.status}</p>
            `;

            // Stats Grid
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';
            Object.entries(char.stats).forEach(([key, value]) => {
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                statCard.innerHTML = `
                    <div class="stat-card-label">${key}</div>
                    <div class="stat-card-value">${value}</div>
                `;
                statsGrid.appendChild(statCard);
            });

            // Moves Gallery
            const movesGallery = document.getElementById('movesGallery');
            movesGallery.innerHTML = '';
            char.moves.forEach(move => {
                const moveCard = document.createElement('div');
                moveCard.className = 'move-card';
                moveCard.innerHTML = `
                    <div class="move-name">${move.name}</div>
                    <div class="move-description">${move.desc}</div>
                `;
                movesGallery.appendChild(moveCard);
            });

            // Power Display
            document.getElementById('powerDisplay').src = char.powerDisplay;

            // Pros/Cons
            const prosList = document.getElementById('prosList');
            prosList.innerHTML = '';
            char.strengths.forEach(strength => {
                const li = document.createElement('li');
                li.textContent = strength;
                prosList.appendChild(li);
            });

            const consList = document.getElementById('consList');
            consList.innerHTML = '';
            char.weaknesses.forEach(weakness => {
                const li = document.createElement('li');
                li.textContent = weakness;
                consList.appendChild(li);
            });

            // Power System
            document.getElementById('powerSystemDesc').textContent = char.powerSystem;

            // Show modal
            document.getElementById('characterModal').classList.add('show');
        }

        function setupEventListeners() {
            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                filteredCharacters = characters.filter(char => 
                    char.name.toLowerCase().includes(query) &&
                    (currentFilter === 'all' || char.animeFilter === currentFilter)
                );
                displayedCount = 12;
                renderCharacters();
            });

            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    
                    const query = document.getElementById('searchInput').value.toLowerCase();
                    filteredCharacters = characters.filter(char => 
                        char.name.toLowerCase().includes(query) &&
                        (currentFilter === 'all' || char.animeFilter === currentFilter)
                    );
                    displayedCount = 12;
                    renderCharacters();
                });
            });

            // Load More
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                displayedCount += 6;
                if (displayedCount >= filteredCharacters.length) {
                    document.getElementById('loadMoreBtn').disabled = true;
                }
                renderCharacters();
            });

            // Fight Button
            document.getElementById('fightBtn').addEventListener('click', () => {
                const fighter1Id = parseInt(document.getElementById('fighter1').value);
                const fighter2Id = parseInt(document.getElementById('fighter2').value);
                
                if (!fighter1Id || !fighter2Id) {
                    alert('Please select both fighters!');
                    return;
                }

                const char1 = characters.find(c => c.id === fighter1Id);
                const char2 = characters.find(c => c.id === fighter2Id);

                const verdict = generateBattleVerdict(char1, char2);
                displayBattleResult(char1, char2, verdict);
            });

            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });

            // Close Modal
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('characterModal').classList.remove('show');
            });

            window.addEventListener('click', (e) => {
                const modal = document.getElementById('characterModal');
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        function generateBattleVerdict(char1, char2) {
            const power1 = char1.stats.power + char1.stats.speed + char1.stats.technique;
            const power2 = char2.stats.power + char2.stats.speed + char2.stats.technique;
            
            let winner, verdict;
            if (power1 > power2) {
                winner = char1.name;
                verdict = `${char1.name} wins! Superior power and technique give ${char1.name} the edge.`;
            } else if (power2 > power1) {
                winner = char2.name;
                verdict = `${char2.name} wins! Better speed and strategy lead to victory.`;
            } else {
                winner = 'Draw';
                verdict = 'It\'s a tie! Both fighters are evenly matched in this battle.';
            }
            
            return { winner, verdict };
        }

        function displayBattleResult(char1, char2, verdict) {
            const result = document.getElementById('battleResult');
            result.innerHTML = `
                <h3 style="color: #ff0080; margin-bottom: 15px; text-transform: uppercase;">⚡ BATTLE ANALYSIS ⚡</h3>
                <table class="battle-table">
                    <tr>
                        <th>Stat</th>
                        <th>${char1.name}</th>
                        <th>${char2.name}</th>
                    </tr>
                    <tr>
                        <td>Power</td>
                        <td>${char1.stats.power}</td>
                        <td>${char2.stats.power}</td>
                    </tr>
                    <tr>
                        <td>Speed</td>
                        <td>${char1.stats.speed}</td>
                        <td>${char2.stats.speed}</td>
                    </tr>
                    <tr>
                        <td>Intelligence</td>
                        <td>${char1.stats.intelligence}</td>
                        <td>${char2.stats.intelligence}</td>
                    </tr>
                    <tr>
                        <td>Durability</td>
                        <td>${char1.stats.durability}</td>
                        <td>${char2.stats.durability}</td>
                    </tr>
                    <tr>
                        <td>Technique</td>
                        <td>${char1.stats.technique}</td>
                        <td>${char2.stats.technique}</td>
                    </tr>
                </table>
                <div class="battle-verdict">
                    <strong>🏆 VERDICT:</strong> ${verdict.verdict}
                </div>
            `;
            result.classList.add('show');
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
